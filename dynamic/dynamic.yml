http:
  middlewares:
    auth:
      forwardAuth:
        address: http://auth:4181
        trustForwardHeader: true
        authResponseHeaders:
          - X-Forwarded-User
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

  routers:
    traefik:
      rule: "Host(`traefik.family.callender`)"
      entryPoints: [web]
      service: api@internal

    keycloak-http:
      rule: "Host(`keycloak.family.callender`)"
      entryPoints: [web]
      service: keycloak

    keycloak:
      rule: "Host(`keycloak.family.callender`)"
      entryPoints: [websecure]
      service: keycloak
      tls: {}

    auth-http:
      rule: "Host(`auth.family.callender`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: auth

    auth:
      rule: "Host(`auth.family.callender`)"
      entryPoints: [websecure]
      service: auth
      tls: {}

    home-http:
      rule: "Host(`home.family.callender`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: home

    home:
      rule: "Host(`home.family.callender`)"
      entryPoints: [websecure]
      middlewares: [auth]
      service: home
      tls: {}

    nextcloud-http:
      rule: "Host(`nextcloud.family.callender`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: nextcloud

    nextcloud:
      rule: "Host(`nextcloud.family.callender`)"
      entryPoints: [websecure]
      service: nextcloud
      tls: {}

    decision-http:
      rule: "Host(`decision.family.callender`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: decision

    decision:
      rule: "Host(`decision.family.callender`)"
      entryPoints: [websecure]
      middlewares: [auth]
      service: decision
      tls: {}

    events-http:
      rule: "Host(`events.family.callender`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: events

    events:
      rule: "Host(`events.family.callender`)"
      entryPoints: [websecure]
      middlewares: [auth]
      service: events
      tls: {}

    education-http:
      rule: "Host(`education.family.callender`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: education

    education:
      rule: "Host(`education.family.callender`)"
      entryPoints: [websecure]
      middlewares: [auth]
      service: education
      tls: {}

    questions-http:
      rule: "Host(`questions.family.callender`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: questions

    questions:
      rule: "Host(`questions.family.callender`)"
      entryPoints: [websecure]
      middlewares: [auth]
      service: questions
      tls: {}

    profiles-http:
      rule: "Host(`profiles.family.callender`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: profiles

    profiles:
      rule: "Host(`profiles.family.callender`)"
      entryPoints: [websecure]
      middlewares: [auth]
      service: profiles
      tls: {}

    planning-http:
      rule: "Host(`planning.family.callender`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: planning

    planning:
      rule: "Host(`planning.family.callender`)"
      entryPoints: [websecure]
      middlewares: [auth]
      service: planning
      tls: {}

    # Allow Vikunja API without forward-auth (Vikunja uses its own JWT)
    tasks-api-http:
      rule: "Host(`tasks.family.callender`) && PathPrefix(`/api`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: tasks

    tasks-api:
      rule: "Host(`tasks.family.callender`) && PathPrefix(`/api`)"
      entryPoints: [websecure]
      service: tasks
      tls: {}

    # Protect the UI
    tasks-http:
      rule: "Host(`tasks.family.callender`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: tasks

    tasks:
      rule: "Host(`tasks.family.callender`)"
      entryPoints: [websecure]
      service: tasks
      tls: {}

    ldap:
      rule: "Host(`ldap.family.callender`)"
      entryPoints: [web]
      service: ldap

  services:
    keycloak:
      loadBalancer:
        servers:
          - url: "http://keycloak:8080"

    auth:
      loadBalancer:
        servers:
          - url: "http://auth:4181"

    home:
      loadBalancer:
        servers:
          - url: "http://home-portal:3000"

    nextcloud:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:11000"
        passHostHeader: true
        serversTransport: "insecure-transport"

    tasks:
      loadBalancer:
        servers:
          - url: "http://vikunja:3456"

    ldap:
      loadBalancer:
        servers:
          - url: "http://ldap:17170"

    decision:
      loadBalancer:
        servers:
          - url: "http://decision-nginx:80"

    events:
      loadBalancer:
        servers:
          - url: "http://family-event-nginx:80"

    education:
      loadBalancer:
        servers:
          - url: "http://education-nginx:80"

    questions:
      loadBalancer:
        servers:
          - url: "http://question-nginx:80"

    profiles:
      loadBalancer:
        servers:
          - url: "http://profile-nginx:80"

    planning:
      loadBalancer:
        servers:
          - url: "http://plan-nginx:80"

  serversTransports:
    insecure-transport:
      insecureSkipVerify: true

tls:
  certificates:
    - certFile: "/certs/wildcard.family.callender.crt"
      keyFile: "/certs/wildcard.family.callender.key"
  stores:
    default:
      defaultCertificate:
        certFile: "/certs/wildcard.family.callender.crt"
        keyFile: "/certs/wildcard.family.callender.key"
