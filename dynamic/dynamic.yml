http:
  middlewares:
    auth:
      forwardAuth:
        address: http://auth:4181
        trustForwardHeader: true
        authResponseHeaders:
          - X-Forwarded-User
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

  routers:
    traefik:
      rule: "Host(`traefik.family.callender`)"
      entryPoints: [web]
      service: api@internal

    keycloak-http:
      rule: "Host(`keycloak.family.callender`)"
      entryPoints: [web]
      service: keycloak

    keycloak:
      rule: "Host(`keycloak.family.callender`)"
      entryPoints: [websecure]
      service: keycloak
      tls: {}

    auth-http:
      rule: "Host(`auth.family.callender`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: auth

    auth:
      rule: "Host(`auth.family.callender`)"
      entryPoints: [websecure]
      service: auth
      tls: {}

    nextcloud-http:
      rule: "Host(`nextcloud.family.callender`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: nextcloud

    nextcloud:
      rule: "Host(`nextcloud.family.callender`)"
      entryPoints: [websecure]
      service: nextcloud
      tls: {}

    decision-http:
      rule: "Host(`decision.family.callender`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: decision

    decision:
      rule: "Host(`decision.family.callender`)"
      entryPoints: [websecure]
      service: decision
      tls: {}

    # Allow Vikunja API without forward-auth (Vikunja uses its own JWT)
    tasks-api-http:
      rule: "Host(`tasks.family.callender`) && PathPrefix(`/api`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: tasks

    tasks-api:
      rule: "Host(`tasks.family.callender`) && PathPrefix(`/api`)"
      entryPoints: [websecure]
      service: tasks
      tls: {}

    # Protect the UI
    tasks-http:
      rule: "Host(`tasks.family.callender`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: tasks

    tasks:
      rule: "Host(`tasks.family.callender`)"
      entryPoints: [websecure]
      service: tasks
      tls: {}

    ldap:
      rule: "Host(`ldap.family.callender`)"
      entryPoints: [web]
      service: ldap

  services:
    keycloak:
      loadBalancer:
        servers:
          - url: "http://keycloak:8080"

    auth:
      loadBalancer:
        servers:
          - url: "http://auth:4181"

    nextcloud:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:11000"
        passHostHeader: true
        serversTransport: "insecure-transport"

    tasks:
      loadBalancer:
        servers:
          - url: "http://vikunja:3456"

    ldap:
      loadBalancer:
        servers:
          - url: "http://ldap:17170"

    decision:
      loadBalancer:
        servers:
          - url: "http://decision-nginx:80"

  serversTransports:
    insecure-transport:
      insecureSkipVerify: true
