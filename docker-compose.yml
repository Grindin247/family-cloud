      - TASK_HYGIENE_MEMBER_OVERLOAD_OPEN_TASKS=${TASK_AGENT_HYGIENE_MEMBER_OVERLOAD_OPEN_TASKS:-12}
      - TASK_VIKUNJA_FAMILY_ID=${TASK_AGENT_FAMILY_ID:-2}
      - TASK_VIKUNJA_WEBHOOK_SECRET=${TASK_VIKUNJA_WEBHOOK_SECRET:-change-me-vikunja-webhook}
      - TASK_VIKUNJA_WEBHOOK_TARGET_URL=${TASK_VIKUNJA_WEBHOOK_TARGET_URL:-http://family-event-api:8000/v1/integrations/vikunja/webhooks/${TASK_AGENT_FAMILY_ID:-2}}
      - TASK_VIKUNJA_RECONCILE_LOOKBACK_MINUTES=${TASK_VIKUNJA_RECONCILE_LOOKBACK_MINUTES:-30}
    networks:
      - decisionnet
    volumes:
      - ./secrets/vikunja_api_token:/run/secrets/vikunja_api_token:ro
    command: celery -A worker.celery_app beat --loglevel=INFO

  decision-web:
    profiles: ["decision"]
    restart: unless-stopped
    build:
      context: ./apps/decision-system/apps/web
    environment:
      - APP_ENV=prod
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=/api/v1
    command: sh -c "npm run build && npm run start"
    networks:
      decisionnet:
        aliases: [web]

  decision-nginx:
    image: nginx:1.27-alpine
    profiles: ["decision"]
    restart: unless-stopped
    depends_on:
      - decision-api
      - decision-web
    volumes:
      - ./apps/decision-system/infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      decisionnet: {}
      familynet: {}
    dns:
      - 172.20.0.11

volumes:
  lldap_data:
  keycloak_data:
  vikunja_db:
  vikunja_files:
  nextcloud_mcp_data:
  decision_postgres_data:
  nats_data:
  family_event_postgres_data:
  question_postgres_data:
  education_postgres_data:
  profile_postgres_data:
  # Nextcloud volume name must match the one used in the Nextcloud AIO container.
  nextcloud_aio_mastercontainer:
    external: true

networks:
  familynet:
    external: true
  decisionnet:
