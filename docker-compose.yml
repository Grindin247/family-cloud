# Must run the following commands before running docker compose up.
#     $ openssl req -x509 -nodes -days 365   -newkey rsa:2048   -keyout certs/wildcard..key   -out certs/wildcard..crt   -subj "/CN=*."   -addext "subjectAltName=DNS:*.,DNS:family"
#     $ docker volume create nextcloud_aio_mastercontainer
#     $ docker network create --subnet=172.20.0.0/24 --driver=bridge familynet
#
# If using WSL2 set the fallback DNS to the window host gateway IP address in the Corefile.
# Update router DNS settings to point to the WSL2 host IP.

services:

  traefik:
    # Use a recent Traefik v3.x to match modern Docker API versions
    image: traefik:v3.3
    environment:
      # Some environments enforce a higher minimum Docker API version.
      # Force Traefik's Docker client to use a modern API.
      - DOCKER_API_VERSION=1.53
    container_name: traefik
    command:
      - --api.dashboard=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./certs:/certs:ro
      # Docker socket not needed in file-provider-only mode
      # - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${FAMILY_DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls=true"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=auth"
      - "traefik.http.middlewares.auth.forwardauth.address=http://auth:4181"
      - "traefik.http.middlewares.auth.forwardauth.trustforwardheader=true"
      - "traefik.http.middlewares.auth.forwardauth.authresponseheaders=X-Forwarded-User"
    networks:
      familynet:
        ipv4_address: 172.20.0.10
    dns:
      - 172.20.0.11

  auth:
    image: thomseddon/traefik-forward-auth
    container_name: auth
    restart: unless-stopped
    environment:
      - DEFAULT_PROVIDER=oidc
      # This must match Keycloak's advertised issuer exactly or the callback token check will fail.
      - PROVIDERS_OIDC_ISSUER_URL=https://keycloak.${FAMILY_DOMAIN}/realms/${KEYCLOAK_REALM}
      - PROVIDERS_OIDC_CLIENT_ID=traefik-forward-auth
      - PROVIDERS_OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - SECRET=${FORWARD_AUTH_COOKIE_SECRET}

      # HTTP mode requires non-secure cookies
      - INSECURE_COOKIE=true
      # Use base domain for cookie scope
      - COOKIE_DOMAIN=${FAMILY_DOMAIN}

      - AUTH_HOST=auth.${FAMILY_DOMAIN}
      - LOG_LEVEL=debug
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`auth.${FAMILY_DOMAIN}`)"
      - "traefik.http.routers.auth.entrypoints=websecure"
      - "traefik.http.routers.auth.tls=true"
      - "traefik.http.services.auth.loadbalancer.server.port=4181"
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./certs/wildcard.${FAMILY_DOMAIN}.crt:/etc/ssl/certs/wildcard.${FAMILY_DOMAIN}.crt:ro
    networks:
      - familynet
    dns:
      - 172.20.0.11
    
  ldap:
    image: lldap/lldap:latest
    container_name: ldap
    restart: unless-stopped
    environment:
      - LLDAP_JWT_SECRET=${LLDAP_JWT_SECRET}
      - LLDAP_LDAP_BASE_DN=dc=example,dc=com
      - LLDAP_LDAP_USER_PASS=${LLDAP_ADMIN_PASSWORD}
    volumes:
      - lldap_data:/data
    ports:
      - "3890:3890"
      - "17170:17170"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ldap.rule=Host(`ldap.${FAMILY_DOMAIN}`)"
      - "traefik.http.routers.ldap.entrypoints=websecure"
      - "traefik.http.routers.ldap.tls=true"
      - "traefik.http.services.ldap.loadbalancer.server.port=17170"
    networks:
      - familynet
    dns:
      - 172.20.0.11

  coredns:
    image: coredns/coredns:latest
    container_name: coredns
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Corefile:/Corefile:ro
    # Bind DNS on the host LAN IP so router/clients can query standard port 53.
    # Using a specific host IP avoids clashes with local stub listeners on 127.0.0.53.
    ports:
      - "192.168.1.52:53:53/udp"
      - "192.168.1.52:53:53/tcp"
    restart: unless-stopped
    networks:
      familynet:
        ipv4_address: 172.20.0.11
    dns:
      - 172.20.0.11

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev
    restart: unless-stopped
    depends_on:
      ldap:
        condition: service_healthy
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - FAMILY_DOMAIN=${FAMILY_DOMAIN}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - NEXTCLOUD_OIDC_CLIENT_SECRET=${NEXTCLOUD_OIDC_CLIENT_SECRET}
      - DECISION_KEYCLOAK_SYNC_CLIENT_SECRET=${DECISION_KEYCLOAK_SYNC_CLIENT_SECRET:-}
      - LLDAP_ADMIN_PASSWORD=${LLDAP_ADMIN_PASSWORD}
      # Optional: Keycloak LDAP Groups mapper tuning for LLDAP (defaults should work for typical LLDAP layouts).
      - LLDAP_GROUPS_DN=${LLDAP_GROUPS_DN:-ou=groups,dc=example,dc=com}
      - LLDAP_GROUP_OBJECT_CLASSES=${LLDAP_GROUP_OBJECT_CLASSES:-groupOfNames}
      - LLDAP_GROUP_NAME_ATTR=${LLDAP_GROUP_NAME_ATTR:-cn}
      - LLDAP_GROUP_MEMBER_ATTR=${LLDAP_GROUP_MEMBER_ATTR:-member}
      - LLDAP_GROUP_MEMBERSHIP_ATTR_TYPE=${LLDAP_GROUP_MEMBERSHIP_ATTR_TYPE:-DN}
      - LLDAP_GROUP_MEMBERSHIP_USER_LDAP_ATTR=${LLDAP_GROUP_MEMBERSHIP_USER_LDAP_ATTR:-uid}
      - LLDAP_GROUPS_MAPPER_MODE=${LLDAP_GROUPS_MAPPER_MODE:-READ_ONLY}
      # Dev/no-router-change mode:
      # Set Keycloak's advertised hostname to the external hostname so browser redirects are valid.
      - KC_HOSTNAME=keycloak.${FAMILY_DOMAIN}
      - KC_HTTP_ENABLED=true
      - KC_PROXY=edge
      - KC_HOSTNAME_STRICT=false
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-config.sh:/opt/keycloak/keycloak-config.sh:ro
      # Optional: used to upsert the Vikunja OIDC client without putting the secret in git.
      - ./secrets/vikunja_oidc_client_secret:/run/secrets/vikunja_oidc_client_secret:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`keycloak.${FAMILY_DOMAIN}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    entrypoint: >
      bash -c "
        /opt/keycloak/bin/kc.sh start-dev &
        until echo > /dev/tcp/localhost/8080 2>/dev/null; do echo 'Waiting for Keycloak...'; sleep 2; done;
        echo 'Running Keycloak configuration...'
        bash /opt/keycloak/keycloak-config.sh

        wait"
    healthcheck:
      test: ["CMD", "sh", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      familynet:
        ipv4_address: 172.20.0.16
    dns:
      - 172.20.0.11

  nextcloud-aio-mastercontainer:
    image: nextcloud/all-in-one:latest
    # Nextcloud container name name must be nextcloud_aio_mastercontainer
    container_name: nextcloud-aio-mastercontainer
    restart: unless-stopped
    privileged: true
    # Expose the AIO setup UI on the host. This does NOT conflict with Traefik.
    ports:
      - "8080:8080"
    volumes:
      - nextcloud_aio_mastercontainer:/mnt/docker-aio-config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - NEXTCLOUD_DATADIR=/mnt/ncdata
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=admin
      - APACHE_PORT=11000
      - APACHE_IP_BINDING=0.0.0.0
      - APACHE_ADDITIONAL_NETWORK=familynet
      - SKIP_DOMAIN_VALIDATION=true
      # NOTE: AIO does not support NEXTCLOUD_TRUSTED_DOMAINS env var; keep domain setup inside AIO UI
      # - NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.${FAMILY_DOMAIN}
      - NEXTCLOUD_WOPI_SKIP_SSL_VERIFY=true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloudsetup.rule=Host(`nextcloudsetup.${FAMILY_DOMAIN}`)"
      - "traefik.http.routers.nextcloudsetup.entrypoints=websecure"
      - "traefik.http.routers.nextcloudsetup.tls=true"
      - "traefik.http.routers.nextcloudsetup.service=nextcloudsetup"
      - "traefik.http.services.nextcloudsetup.loadbalancer.server.port=8080"
      - "traefik.http.services.nextcloudsetup.loadbalancer.server.scheme=https"
    networks:
      familynet:
        ipv4_address: 172.20.0.12
    dns:
      - 172.20.0.11
    depends_on:
      keycloak:
        condition: service_healthy

  home-portal:
    build:
      context: ./apps/home-portal
    container_name: home-portal
    restart: unless-stopped
    environment:
      - APP_ENV=prod
      - NODE_ENV=production
      - NEXT_PUBLIC_FAMILY_DOMAIN=${FAMILY_DOMAIN}
      - NEXTCLOUD_BASE_URL=https://nextcloud.${FAMILY_DOMAIN}
      - HOME_PORTAL_DECISION_API_BASE_URL=${HOME_PORTAL_DECISION_API_BASE_URL:-http://decision-api:8000/v1}
      - HOME_PORTAL_FILE_AGENT_FAMILY_ID=${FILE_AGENT_FAMILY_ID:-2}
      - HOME_PORTAL_FILE_AGENT_ACTOR=${FILE_AGENT_ACTOR:-mrjamescallender@gmail.com}
    command: sh -c "npm run build && npm run start"
    volumes:
      - ./secrets/nextcloud_mcp_username:/run/secrets/nextcloud_mcp_username:ro
      - ./secrets/nextcloud_mcp_app_password:/run/secrets/nextcloud_mcp_app_password:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.home.rule=Host(`home.${FAMILY_DOMAIN}`)"
      - "traefik.http.routers.home.entrypoints=websecure"
      - "traefik.http.routers.home.tls=true"
      - "traefik.http.routers.home.middlewares=auth"
      - "traefik.http.services.home.loadbalancer.server.port=3000"
    networks:
      - familynet
    dns:
      - 172.20.0.11

  nextcloud-mcp:
    image: family-cloud-nextcloud-mcp
    build:
      context: ./apps/nextcloud-mcp-overlay
      dockerfile: Dockerfile
      args:
        NEXTCLOUD_MCP_BASE_IMAGE: ${NEXTCLOUD_MCP_BASE_IMAGE:-ghcr.io/cbcoutinho/nextcloud-mcp-server@sha256:a48f8f30bd7a5bc4d102e95ab0acca445a8969da460285926053805a83dbbf56}
    container_name: nextcloud-mcp
    profiles: ["agents"]
    restart: unless-stopped
    depends_on:
      unstructured:
        condition: service_started
    environment:
      - NEXTCLOUD_HOST=http://nextcloud-aio-apache:11000
      - NEXTCLOUD_USERNAME_FILE=/run/secrets/nextcloud_mcp_username
      - NEXTCLOUD_PASSWORD_FILE=/run/secrets/nextcloud_mcp_app_password
      - NEXTCLOUD_MCP_SERVER_URL=${NEXTCLOUD_MCP_PUBLIC_URL:-http://nextcloud-mcp:8000}
      - NEXTCLOUD_PUBLIC_ISSUER_URL=${NEXTCLOUD_MCP_PUBLIC_URL:-https://nextcloud.${FAMILY_DOMAIN}}
      - NEXTCLOUD_MCP_TRANSPORT=${NEXTCLOUD_MCP_TRANSPORT:-streamable-http}
      - NEXTCLOUD_MCP_AUTH_MODE=${NEXTCLOUD_MCP_AUTH_MODE:-basic}
      - NEXTCLOUD_READY_TAG_NAME=${NEXTCLOUD_READY_TAG_NAME:-ready}
      - ENABLE_DOCUMENT_PROCESSING=${NEXTCLOUD_MCP_ENABLE_DOCUMENT_PROCESSING:-true}
      - DOCUMENT_PROCESSOR=${NEXTCLOUD_MCP_DOCUMENT_PROCESSOR:-unstructured}
      - ENABLE_UNSTRUCTURED=${NEXTCLOUD_MCP_ENABLE_UNSTRUCTURED:-true}
      - UNSTRUCTURED_API_URL=${NEXTCLOUD_MCP_UNSTRUCTURED_API_URL:-http://unstructured:8000}
      - UNSTRUCTURED_TIMEOUT=${NEXTCLOUD_MCP_UNSTRUCTURED_TIMEOUT:-120}
      - UNSTRUCTURED_STRATEGY=${NEXTCLOUD_MCP_UNSTRUCTURED_STRATEGY:-auto}
      - UNSTRUCTURED_LANGUAGES=${NEXTCLOUD_MCP_UNSTRUCTURED_LANGUAGES:-eng}
    volumes:
      - nextcloud_mcp_data:/app/data
      - ./secrets/nextcloud_mcp_username:/run/secrets/nextcloud_mcp_username:ro
      - ./secrets/nextcloud_mcp_app_password:/run/secrets/nextcloud_mcp_app_password:ro
    ports:
      - "127.0.0.1:${NEXTCLOUD_MCP_PORT:-8002}:8000"
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - familynet
    dns:
      - 172.20.0.11

  unstructured:
    image: ${UNSTRUCTURED_IMAGE:-downloads.unstructured.io/unstructured-io/unstructured-api:latest}
    container_name: unstructured
    profiles: ["agents"]
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.create_connection(('127.0.0.1', 8000), 5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - familynet
    dns:
      - 172.20.0.11

  # --- Infrastructure / remote access ---
  # Enable with: docker compose --profile infra up -d wireguard
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    profiles: ["infra"]
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=${WIREGUARD_PUID:-1000}
      - PGID=${WIREGUARD_PGID:-1000}
      - TZ=${TZ}
      - LOG_CONFS=true
    ports:
      - "${WIREGUARD_SERVER_PORT:-51820}:${WIREGUARD_SERVER_PORT:-51820}/udp"
    volumes:
      - ./config/wireguard:/config
      - /lib/modules:/lib/modules:ro
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    healthcheck:
      test: ["CMD-SHELL", "wg show wg0 >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - familynet

  # --- Agent task tracking (Kanban) ---
  # Vikunja: https://vikunja.io
  # Enable with: docker compose --profile ops up -d
  vikunja-db:
    image: postgres:16
    container_name: vikunja-db
    profiles: ["ops"]
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${VIKUNJA_DB_PASSWORD:-vikunja}
      - POSTGRES_USER=${VIKUNJA_DB_USER:-vikunja}
      - POSTGRES_DB=${VIKUNJA_DB_NAME:-vikunja}
      - TZ=${TZ}
    volumes:
      - vikunja_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VIKUNJA_DB_USER:-vikunja} -d ${VIKUNJA_DB_NAME:-vikunja}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - familynet
    dns:
      - 172.20.0.11

  vikunja:
    # Combined Vikunja image (frontend + api)
    image: vikunja/vikunja:latest
    container_name: vikunja
    profiles: ["ops"]
    depends_on:
      vikunja-db:
        condition: service_healthy
      ldap:
        condition: service_healthy
    restart: unless-stopped
    # Image runs as non-root; mount writable volumes and set a writable cache dir
    user: "0:0"
    environment:
      - VIKUNJA_DATABASE_TYPE=postgres
      - VIKUNJA_DATABASE_HOST=vikunja-db
      - VIKUNJA_DATABASE_USER=${VIKUNJA_DB_USER:-vikunja}
      - VIKUNJA_DATABASE_PASSWORD=${VIKUNJA_DB_PASSWORD:-vikunja}
      - VIKUNJA_DATABASE_DATABASE=${VIKUNJA_DB_NAME:-vikunja}
      - VIKUNJA_SERVICE_JWTSECRET=${VIKUNJA_JWT_SECRET:-change-me}
      - VIKUNJA_SERVICE_PUBLICURL=https://tasks.${FAMILY_DOMAIN}
      - VIKUNJA_SERVICE_ENABLEREGISTRATION=${VIKUNJA_ENABLE_REGISTRATION:-false}
      - XDG_CACHE_HOME=/tmp/.cache
      - TZ=${TZ}
      # LDAP auth (LLDAP)
      # Docs: https://vikunja.io/docs/ldap/
      - VIKUNJA_AUTH_LDAP_ENABLED=${VIKUNJA_LDAP_ENABLED:-false}
      - VIKUNJA_AUTH_LDAP_HOST=${VIKUNJA_LDAP_HOST:-ldap}
      - VIKUNJA_AUTH_LDAP_PORT=${VIKUNJA_LDAP_PORT:-3890}
      - VIKUNJA_AUTH_LDAP_BASEDN=${VIKUNJA_LDAP_BASEDN:-dc=example,dc=com}
      - VIKUNJA_AUTH_LDAP_USERFILTER=${VIKUNJA_LDAP_USERFILTER:-(&(objectClass=inetOrgPerson)(|(uid=%[1]s)(mail=%[1]s)))}
      - VIKUNJA_AUTH_LDAP_BINDDN=${VIKUNJA_LDAP_BINDDN:-uid=admin,ou=people,dc=example,dc=com}
      - VIKUNJA_AUTH_LDAP_BINDPASSWORD=${VIKUNJA_LDAP_BINDPASSWORD:-}
      - VIKUNJA_AUTH_LDAP_USETLS=${VIKUNJA_LDAP_USETLS:-false}
      - VIKUNJA_AUTH_LDAP_ATTRIBUTE_USERNAME=${VIKUNJA_LDAP_ATTRIBUTE_USERNAME:-uid}
      - VIKUNJA_AUTH_LDAP_ATTRIBUTE_EMAIL=${VIKUNJA_LDAP_ATTRIBUTE_EMAIL:-mail}
      - VIKUNJA_AUTH_LDAP_ATTRIBUTE_DISPLAYNAME=${VIKUNJA_LDAP_ATTRIBUTE_DISPLAYNAME:-cn}
    volumes:
      - vikunja_files:/app/vikunja/files
      # Enables OIDC providers (Keycloak) and keeps secrets in a file.
      - ./config/vikunja/config.yml:/app/vikunja/config.yml:ro
      - ./secrets/vikunja_oidc_client_secret:/run/secrets/vikunja_oidc_client_secret:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tasks.rule=Host(`tasks.${FAMILY_DOMAIN}`)"
      - "traefik.http.routers.tasks.entrypoints=websecure"
      - "traefik.http.routers.tasks.tls=true"
      - "traefik.http.services.tasks.loadbalancer.server.port=3456"
    networks:
      - familynet
    dns:
      - 172.20.0.11

  vikunja-mcp:
    image: family-cloud-vikunja-mcp-wrapper
    build:
      context: ./apps/vikunja-mcp-wrapper
      dockerfile: Dockerfile
      args:
        VIKUNJA_MCP_PYPI_VERSION: ${VIKUNJA_MCP_PYPI_VERSION:-0.9.3}
    container_name: vikunja-mcp
    profiles: ["ops"]
    depends_on:
      vikunja:
        condition: service_started
    environment:
      - VIKUNJA_URL=${VIKUNJA_MCP_URL:-http://vikunja:3456}
      - VIKUNJA_TOKEN_FILE=/run/secrets/vikunja_api_token
    volumes:
      - ./secrets/vikunja_api_token:/run/secrets/vikunja_api_token:ro
    networks:
      - familynet
    dns:
      - 172.20.0.11

  vikunja-mcp-http:
    image: family-cloud-vikunja-mcp-wrapper
    build:
      context: ./apps/vikunja-mcp-wrapper
      dockerfile: Dockerfile
      args:
        VIKUNJA_MCP_PYPI_VERSION: ${VIKUNJA_MCP_PYPI_VERSION:-0.9.3}
    container_name: vikunja-mcp-http
    profiles: ["ops", "agents"]
    depends_on:
      vikunja:
        condition: service_started
    command:
      - python
      - -c
      - "from vikunja_mcp.server import mcp; mcp.run(transport='streamable-http', host='0.0.0.0', port=8000)"
    environment:
      - VIKUNJA_URL=${VIKUNJA_MCP_URL:-http://vikunja:3456}
      - VIKUNJA_TOKEN_FILE=/run/secrets/vikunja_api_token
    volumes:
      - ./secrets/vikunja_api_token:/run/secrets/vikunja_api_token:ro
    networks:
      - familynet
    dns:
      - 172.20.0.11

  # --- Decision system (optional profile) ---
  # Enable with: docker compose --profile decision up -d --build
  decision-db:
    image: pgvector/pgvector:pg16
    profiles: ["decision"]
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DECISION_POSTGRES_DB:-decision_system}
      - POSTGRES_USER=${DECISION_POSTGRES_USER:-decision_user}
      - POSTGRES_PASSWORD=${DECISION_POSTGRES_PASSWORD:-change-me}
      - TZ=${TZ}
    volumes:
      - decision_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DECISION_POSTGRES_USER:-decision_user} -d ${DECISION_POSTGRES_DB:-decision_system}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      decisionnet:
        aliases: [db]

  decision-redis:
    image: redis:7-alpine
    profiles: ["decision"]
    restart: unless-stopped
    networks:
      decisionnet:
        aliases: [redis]

  nats:
    image: nats:2.10-alpine
    profiles: ["decision"]
    restart: unless-stopped
    # Enable NATS server monitoring endpoint ("dashboard") on :8222
    # Useful endpoints:
    #   http://localhost:8222/           (landing)
    #   http://localhost:8222/varz      (server stats)
    #   http://localhost:8222/connz     (connections)
    #   http://localhost:8222/routez    (routes)
    #   http://localhost:8222/subsz     (subscriptions)
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"  # client connections
      - "8222:8222"  # monitoring endpoint
    volumes:
      - nats_data:/data
    networks:
      decisionnet:
        aliases: [nats]
      familynet: {}

  decision-api:
    profiles: ["decision"]
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/decision-system/apps/api/Dockerfile
    depends_on:
      decision-db:
        condition: service_healthy
      decision-redis:
